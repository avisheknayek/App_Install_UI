<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar</title>
    <link rel="stylesheet" href="install.css">
    
    
</head>
<body>
    <div class="container">
        <div class="circle">
            <!-- Progress bar-->
            <svg width="150" height="150">
                <circle cx="75" cy="75" r="65" class="bg"></circle>
                <circle cx="75" cy="75" r="65" class="progress" id="progressCircle"></circle>
            </svg>

            <!-- Center Icon -->
             <div class="icon">
                <svg viewBox="0 0 48 48">
                    <path fill="#FF3D00"
                    d="M43.2,33.9c-0.4,2.1-2.1,3.7-4.2,4c-3.3,0.5-8.8,1.1-15,1.1
                    c-6.1,0-11.6-0.6-15-1.1c-2.1-0.3-3.8-1.9-4.2-4C4.4,31.6,4,28.2,
                    4,24c0-4.2,0.4-7.6,0.8-9.9c0.4-2.1,2.1-3.7,4.2-4C12.3,9.6,
                    17.8,9,24,9c6.2,0,11.6,0.6,15,1.1c2.1,0.3,3.8,1.9,4.2,4
                    c0.4,2.3,0.9,5.7,0.9,9.9C44,28.2,43.6,31.6,43.2,33.9z"/>
                    <path fill="#FFF" d="M20 31L20 17 32 24z"/>
                </svg>
             </div>
        </div>

        <div class="app-name">
            <h2>YouTube</h2>
            <h4>Google LLC</h4>
            <p>Contains ads &bull; In-app purchases</p>
            <div class="percent" id="percent">0%</div>
        </div>
    </div>
    <div class="btns">
        <button class="uninstall" id="btn1" onclick="uninstallApp()">Uninstall</button>
        <button class="install" id="btn2" onclick="installApp()">Install</button>
    </div>
    <script src="install.js"></script>
</body>
</html>
